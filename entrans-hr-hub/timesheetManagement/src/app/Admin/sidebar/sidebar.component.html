<div class="flex h-full fixed pointer-events-none">
  <!-- Sidebar -->
  <aside [class.hidden]="sidebarHidden" [class.w-20]="sidebarHidden" [class.w-72]="!sidebarHidden"
    class="bg-primary text-slate-200 transition-all duration-300 flex flex-col shadow-xl border-r border-primary/20 h-screen z-50 overflow-y-auto overflow-x-hidden pointer-events-auto">

    <!-- Logo Area Top -->
    <div
      class="h-20 flex items-center justify-center border-b border-white/10 sticky top-0 bg-primary z-10 shrink-0"
      [ngClass]="{'px-6 justify-start': !sidebarHidden}">
      <div
        class="w-10 h-10 rounded-xl bg-white text-primary flex items-center justify-center shadow-md font-extrabold text-xl shrink-0">
        HR
      </div>
      <div *ngIf="!sidebarHidden" class="ml-3 flex flex-col">
        <span class="font-extrabold text-white text-lg tracking-tight leading-none">HR Hub</span>
        <span class="text-white/60 text-[10px] font-bold uppercase tracking-widest mt-0.5">Elite Edition</span>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex flex-col w-full py-6 px-4 gap-2">

      <!-- Section Label -->
      <div *ngIf="!sidebarHidden" class="px-3 mb-2 mt-2">
        <span class="text-xs font-bold text-white/40 uppercase tracking-wider">Main Menu</span>
      </div>

      <!-- My Profile -->
      <div class="group">
        <a routerLink="/user-profile" routerLinkActive="bg-white/15 text-white font-bold border-l-4 border-white"
          class="flex items-center rounded-xl py-3 px-3 transition-all duration-200 no-underline whitespace-nowrap text-white hover:bg-white/10 hover:text-white"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i
            class="bi bi-person-circle flex items-center justify-center text-lg shrink-0 transition-transform group-hover:scale-105"></i>
          <span class="font-semibold ml-3" *ngIf="!sidebarHidden">My Profile</span>
        </a>
      </div>

      <!-- Dashboard -->
      <div class="group">
        <a routerLink="/admin" routerLinkActive="bg-white/15 text-white font-bold border-l-4 border-white"
          [routerLinkActiveOptions]="{exact: true}"
          class="flex items-center rounded-xl py-3 px-3 transition-all duration-200 no-underline whitespace-nowrap text-white hover:bg-white/10 hover:text-white"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i
            class="bi bi-grid-1x2 flex items-center justify-center text-lg shrink-0 transition-transform group-hover:scale-105"></i>
          <span class="font-semibold ml-3" *ngIf="!sidebarHidden">Dashboard</span>
        </a>
      </div>

      <!-- Section Label -->
      <div *ngIf="isAdmin && !sidebarHidden" class="px-3 mb-2 mt-6">
        <span class="text-xs font-bold text-white/40 uppercase tracking-wider">Administration</span>
      </div>

      <!-- Timesheet Automation with dropdown -->
      <div *ngIf="isAdmin" class="group">
        <div class="relative">
          <button (click)="toggleTimesheetDropdown()"
            class="flex items-center w-full rounded-xl py-3 px-3 transition-all duration-200 text-white hover:bg-white/10 hover:text-white focus:outline-none"
            [ngClass]="{'justify-center': sidebarHidden, 'bg-white/10 text-white': showTimesheetDropdown && !sidebarHidden}">
            <i class="bi bi-calendar-range flex items-center justify-center text-lg shrink-0 transition-transform group-hover:scale-105"
              [ngClass]="{'text-white': showTimesheetDropdown}"></i>
            <span class="font-semibold ml-3 flex-1 text-left" *ngIf="!sidebarHidden">Timesheet Tools</span>
            <i *ngIf="!sidebarHidden" class="bi text-xs transition-transform"
              [ngClass]="showTimesheetDropdown ? 'bi-chevron-up text-white' : 'bi-chevron-down text-white/50'"></i>
          </button>

          <!-- Dropdown items -->
          <div *ngIf="!sidebarHidden && showTimesheetDropdown"
            class="ml-4 mt-2 mb-2 pl-4 border-l border-white/20 space-y-1 overflow-hidden">
            <a routerLink="/timesheet" routerLinkActive="text-white bg-white/20 font-bold"
              class="flex items-center rounded-lg py-2 px-3 transition-all duration-200 no-underline whitespace-nowrap text-sm text-white hover:text-white hover:bg-white/10">
              <i class="bi bi-cloud-arrow-up text-base mr-3"></i>
              <span class="font-medium">Upload Automation</span>
            </a>
            <a routerLink="/validation-timesheet" routerLinkActive="text-white bg-white/20 font-bold"
              class="flex items-center rounded-lg py-2 px-3 transition-all duration-200 no-underline whitespace-nowrap text-sm text-white hover:text-white hover:bg-white/10">
              <i class="bi bi-clipboard-check text-base mr-3"></i>
              <span class="font-medium">Manual Validation</span>
            </a>
          </div>
        </div>
      </div>

      <!-- PPT Automation -->
      <div *ngIf="isAdmin" class="group">
        <a routerLink="/ppt-automation" routerLinkActive="bg-white/15 text-white font-bold border-l-4 border-white"
          class="flex items-center rounded-xl py-3 px-3 transition-all duration-200 no-underline whitespace-nowrap text-white hover:bg-white/10 hover:text-white"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i
            class="bi bi-file-earmark-slides flex items-center justify-center text-lg shrink-0 transition-transform group-hover:scale-105"></i>
          <span class="font-semibold ml-3" *ngIf="!sidebarHidden">Anniversary Slides</span>
        </a>
      </div>

      <!-- Create Project -->
      <div *ngIf="isAdmin" class="group">
        <a routerLink="/create-project" routerLinkActive="bg-white/15 text-white font-bold border-l-4 border-white"
          class="flex items-center rounded-xl py-3 px-3 transition-all duration-200 no-underline whitespace-nowrap text-white hover:bg-white/10 hover:text-white"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i
            class="bi bi-folder-plus flex items-center justify-center text-lg shrink-0 transition-transform group-hover:scale-105"></i>
          <span class="font-semibold ml-3" *ngIf="!sidebarHidden">Create Project</span>
        </a>
      </div>

      <!-- Project Members (admin only) -->
      <div *ngIf="isAdmin" class="group">
        <a routerLink="/project-members" routerLinkActive="bg-white/15 text-white font-bold border-l-4 border-white"
          class="flex items-center rounded-xl py-3 px-3 transition-all duration-200 no-underline whitespace-nowrap text-white hover:bg-white/10 hover:text-white"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i
            class="bi bi-people-fill flex items-center justify-center text-lg shrink-0 transition-transform group-hover:scale-105"></i>
          <span class="font-semibold ml-3" *ngIf="!sidebarHidden">Project Members</span>
        </a>
      </div>

      <!-- User List (admin only) -->
      <div *ngIf="isAdmin" class="group">
        <a routerLink="/user-list" routerLinkActive="bg-white/15 text-white font-bold border-l-4 border-white"
          class="flex items-center rounded-xl py-3 px-3 transition-all duration-200 no-underline whitespace-nowrap text-white hover:bg-white/10 hover:text-white"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i
            class="bi bi-people flex items-center justify-center text-lg shrink-0 transition-transform group-hover:scale-105"></i>
          <span class="font-semibold ml-3" *ngIf="!sidebarHidden">User List</span>
        </a>
      </div>

    </div>

    <!-- Bottom Footer -->
    <div class="mt-auto border-t border-white/10 px-4 py-3 shrink-0">
      <div class="flex items-center justify-center text-white/30 text-xs font-medium" *ngIf="!sidebarHidden">
        v2.0 Elite Edition
      </div>
    </div>
  </aside>

  <!-- Router Outlet Wrapper -->
  <div class="flex-1 w-full ml-0 transition-all duration-300 pointer-events-none"
    [ngClass]="{'ml-20': sidebarHidden, 'ml-72': !sidebarHidden}">
    <router-outlet></router-outlet>
  </div>
</div>

<!-- ===== Change Password Modal ===== -->
<div *ngIf="showChangePasswordModal"
  class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[200] p-4"
  (click)="closeChangePassword()">

  <div class="card !p-0 w-full max-w-md overflow-hidden"
    (click)="$event.stopPropagation()">

    <!-- Modal Header -->
    <div class="flex justify-between items-center px-6 py-5 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-primary/10 flex items-center justify-center">
          <i class="bi bi-shield-lock text-primary text-base"></i>
        </div>
        <h2 class="card-title">Change Password</h2>
      </div>
      <button (click)="closeChangePassword()"
        class="text-slate-700 hover:text-slate-900 hover:bg-slate-100 p-2 rounded-full transition-colors focus:outline-none">
        <i class="bi bi-x-lg text-sm text-slate-800"></i>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="p-6">

      <!-- Success -->
      <div *ngIf="cpSuccess"
        class="flex items-start gap-3 bg-green-50 border border-green-200 text-green-800 rounded-xl p-3 mb-5 text-sm">
        <i class="bi bi-check-circle-fill text-green-500 mt-0.5"></i>
        <span>{{ cpSuccess }}</span>
      </div>

      <!-- Error -->
      <div *ngIf="cpError"
        class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-800 rounded-xl p-3 mb-5 text-sm">
        <i class="bi bi-exclamation-circle-fill text-red-500 mt-0.5"></i>
        <span>{{ cpError }}</span>
      </div>

      <form (ngSubmit)="submitChangePassword()" class="space-y-4">

        <!-- Current Password -->
        <div>
          <label class="label-text">Current Password</label>
          <div class="relative">
            <input [(ngModel)]="cpForm.old_password" name="old_password"
              [type]="showOldPwd ? 'text' : 'password'" placeholder="Enter current password"
              class="form-input pr-10" />
            <button type="button" (click)="showOldPwd = !showOldPwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-700 hover:text-slate-900 focus:outline-none">
              <i [class]="showOldPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- New Password -->
        <div>
          <label class="label-text">New Password</label>
          <div class="relative">
            <input [(ngModel)]="cpForm.new_password" name="new_password"
              [type]="showNewPwd ? 'text' : 'password'" placeholder="Minimum 8 characters"
              class="form-input pr-10" />
            <button type="button" (click)="showNewPwd = !showNewPwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-700 hover:text-slate-900 focus:outline-none">
              <i [class]="showNewPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Confirm New Password -->
        <div>
          <label class="label-text">Confirm New Password</label>
          <div class="relative">
            <input [(ngModel)]="cpForm.confirm_password" name="confirm_password"
              [type]="showConfirmPwd ? 'text' : 'password'" placeholder="Repeat new password"
              class="form-input pr-10" />
            <button type="button" (click)="showConfirmPwd = !showConfirmPwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-700 hover:text-slate-900 focus:outline-none">
              <i [class]="showConfirmPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-2">
          <button type="button" (click)="closeChangePassword()"
            class="btn btn-secondary flex-1">
            Cancel
          </button>
          <button type="submit" [disabled]="cpLoading"
            class="btn btn-primary flex-1">
            <span *ngIf="cpLoading" class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
            <span>{{ cpLoading ? 'Saving...' : 'Change Password' }}</span>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
