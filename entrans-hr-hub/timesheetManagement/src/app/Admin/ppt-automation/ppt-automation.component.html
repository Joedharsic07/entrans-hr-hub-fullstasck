<div class="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden relative">
  <!-- Decorative Background for entire view -->
  <div
    class="absolute top-0 left-0 right-0 h-96 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none origin-top blur-3xl transform scale-150 z-0">
  </div>

  <!-- Sidebar -->
  <div
    class="hidden md:block md:w-72 bg-white border-r border-slate-200 relative z-20 flex-shrink-0">
    <app-sidebar></app-sidebar>
  </div>

  <!-- Main Content Area -->
  <div class="main-content-wrapper">
    <div class="w-full max-w-7xl flex flex-col justify-start items-start min-h-full">

      <div
        class="bg-white rounded-xl shadow-sm w-full p-5 sm:p-7 border border-slate-200/60 relative overflow-hidden">

        <!-- Top decorative accent -->
        <div class="absolute top-0 left-0 right-0 h-1 bg-primary"></div>

        <div class="flex flex-col items-center mb-5 text-center">
          <div
            class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center mb-3 border border-primary/20">
            <i class="bi bi-file-earmark-slides text-primary text-2xl"></i>
          </div>
          <h1 class="text-xl font-extrabold text-slate-900 tracking-tight mb-1">Anniversary Slide Generator</h1>
          <p class="text-slate-500 text-xs font-medium max-w-sm">Automatically create beautiful presentation slides to celebrate employee work anniversaries.</p>
        </div>

        <form [formGroup]="pptForm" (ngSubmit)="onSubmit()" class="space-y-4">

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <!-- Employee Name -->
            <div>
              <label for="name" class="block text-sm font-bold text-slate-700 mb-2">Employee Name</label>
              <input id="name" formControlName="name" type="text" placeholder="e.g. Jane Doe"
                class="block w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-4 text-slate-800 placeholder-slate-400 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" />
              <div *ngIf="formSubmitted && pptForm.controls['name'].errors"
                class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-2">
                <i class="bi bi-exclamation-circle-fill"></i>
                Employee name is required.
              </div>
            </div>

            <!-- Years of Service -->
            <div>
              <label for="years" class="block text-sm font-bold text-slate-700 mb-2">Years of Service</label>
              <input id="years" formControlName="years" type="number" placeholder="e.g. 5"
                class="block w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-4 text-slate-800 placeholder-slate-400 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" />
              <div *ngIf="formSubmitted && pptForm.controls['years'].errors"
                class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-2">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span *ngIf="pptForm.controls['years'].errors['required']">Years of service is required.</span>
                <span *ngIf="pptForm.controls['years'].errors['min']">Must be at least 1 year.</span>
              </div>
            </div>
          </div>

          <!-- File Upload & Generate -->
          <div
            class="bg-slate-50 rounded-xl p-5 sm:p-6 border border-slate-200 hover:border-primary/50 transition-colors mt-2 relative overflow-hidden group">

            <div
              class="absolute right-0 bottom-0 opacity-5 transform translate-x-1/4 translate-y-1/4 group-hover:scale-105 transition-transform duration-500 pointer-events-none">
              <i class="bi bi-file-earmark-slides text-primary text-9xl"></i>
            </div>

            <div class="flex flex-col sm:flex-row items-start sm:items-end gap-5 relative z-10 w-full">
              <div class="w-full">
                <label for="file" class="block text-sm font-bold text-slate-700 mb-2">Upload Excel Data</label>
                <div class="relative group/input">
                  <input id="file" type="file" (change)="onFileChange($event)"
                    class="block w-full text-slate-600 text-sm bg-white border border-slate-200 rounded-lg file:mr-4 file:py-2.5 file:px-4 file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all cursor-pointer shadow-sm" />
                </div>
              </div>
              <div class="w-full sm:w-auto flex-shrink-0">
                <button type="submit"
                  class="w-full sm:w-auto h-[46px] px-6 bg-primary hover:bg-primary-hover text-white font-bold text-sm lg:text-base rounded-lg shadow-md focus:outline-none focus:ring-4 focus:ring-primary/20 transition-all flex items-center justify-center gap-2 cursor-pointer">
                  <i class="bi bi-gear-fill"></i>
                  <span>Generate</span>
                </button>
              </div>
            </div>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>
