<div class="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden relative">
  <!-- Decorative Background -->
  <div
    class="absolute top-0 left-0 right-0 h-96 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none origin-top blur-3xl transform scale-150 z-0">
  </div>

  <!-- Sidebar -->
  <div
    class="hidden md:block md:w-72 bg-white border-r border-slate-200 relative z-20 flex-shrink-0">
    <app-sidebar></app-sidebar>
  </div>

  <div class="main-content-wrapper">
    <div class="w-full max-w-7xl flex flex-col min-h-full">

      <!-- Header Section -->
      <div
        class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-5 bg-white p-4 rounded-xl shadow-sm border border-slate-200 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
        <div>
          <div class="flex items-center gap-3">
            <div
              class="w-9 h-9 rounded-lg bg-primary/10 flex items-center justify-center flex-shrink-0 border border-primary/20 text-primary shrink-0">
              <i class="bi bi-clipboard-check text-lg"></i>
            </div>
            <div>
              <h1 class="text-xl font-extrabold text-slate-900 tracking-tight leading-tight">Manual Validation</h1>
              <p class="text-slate-500 text-xs font-medium">Select a month and validate reported timesheets manually.</p>
            </div>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-4 mt-4 md:mt-0">
          <div class="relative w-full sm:w-auto">
            <label class="sr-only" for="monthSelector">Select Month</label>
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="bi bi-calendar-month text-slate-400"></i>
            </div>
            <input type="month" id="monthSelector" [(ngModel)]="selectedMonth" (change)="fetchData()"
              class="block w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm cursor-pointer" />
          </div>

          <button (click)="validateSelected()" [disabled]="loading || !selectedMonth"
            class="w-full sm:w-auto px-6 py-2.5 bg-primary hover:bg-primary-hover disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none text-white font-bold rounded-lg shadow-md transition-all flex items-center justify-center gap-2 cursor-pointer focus:outline-none focus:ring-4 focus:ring-primary/20">
            <i class="bi bi-play-fill text-lg leading-none" *ngIf="!loading"></i>
            <span>Validate Selected</span>
            <svg *ngIf="loading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg"
              fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Table Container -->
      <div
        class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden relative flex-1">
        <div class="overflow-x-auto min-h-[400px]">
          <table class="min-w-full divide-y divide-slate-200">

            <thead class="bg-slate-50/80 sticky top-0 z-10 shadow-sm">
              <tr>
                <th scope="col" class="px-5 py-4 w-16 text-center">
                  <div class="flex items-center justify-center">
                    <input type="checkbox" id="selectAll" [(ngModel)]="selectAll" (change)="toggleSelectAll()"
                      class="w-5 h-5 cursor-pointer rounded" style="accent-color: #1F3A5F;">
                  </div>
                </th>
                <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">
                  User Details</th>
                <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">
                  Project</th>
                <th scope="col"
                  class="px-6 py-4 text-center text-xs font-bold text-slate-500 uppercase tracking-wider w-32">Status
                </th>
                <th scope="col"
                  class="px-6 py-4 text-right text-xs font-bold text-slate-500 uppercase tracking-wider w-40">Action
                </th>
              </tr>
            </thead>

            <tbody class="bg-white divide-y divide-slate-100">
              <!-- Empty State (if no data) -->
              <tr *ngIf="!data || data.length === 0">
                <td colspan="5" class="px-6 py-16 text-center text-slate-500">
                  <div
                    class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-200">
                    <i class="bi bi-inbox text-2xl text-slate-400"></i>
                  </div>
                  <p class="font-bold text-lg text-slate-700">No timesheets to validate.</p>
                  <p class="text-sm mt-1">Please select a month with available timesheet data.</p>
                </td>
              </tr>

              <!-- Data Rows -->
              <tr *ngFor="let e of data" class="hover:bg-slate-50 transition-colors group">

                <td class="px-5 py-4 w-16 text-center whitespace-nowrap align-middle">
                  <div class="flex items-center justify-center">
                    <input type="checkbox" [(ngModel)]="e.selected" (change)="onRowCheckboxChange()"
                      class="w-5 h-5 cursor-pointer rounded" style="accent-color: #1F3A5F;">
                  </div>
                </td>

                <td class="px-6 py-4 whitespace-nowrap">
                  <div class="flex flex-col">
                    <span class="text-sm font-bold text-slate-800">{{ e.user_name }}</span>
                  </div>
                </td>

                <td class="px-6 py-4 whitespace-nowrap">
                  <div
                    class="inline-flex items-center px-2.5 py-1 rounded-md bg-slate-100 text-slate-700 text-xs font-bold border border-slate-200">
                    {{ e.project_name }}
                  </div>
                </td>

                <td class="px-6 py-4 whitespace-nowrap text-center align-middle">
                  <div class="flex items-center justify-center">
                    <span *ngIf="e.loading"
                      class="text-primary flex items-center justify-center w-8 h-8 rounded-full bg-primary/10">
                      <i class="bi bi-arrow-repeat animate-spin text-lg"></i>
                    </span>

                    <ng-container *ngIf="!e.loading">

                      <!-- Needs rerun with errors -->
                      <ng-container *ngIf="e.validation_status === 'Needs rerun' && e.error">
                        <div
                          class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-orange-50 border border-orange-100">
                          <span class="text-yellow-600" title="Changes detected. Needs rerun"><i
                              class="bi bi-arrow-repeat text-sm"></i></span>
                          <span class="text-red-500 cursor-help relative group/tooltip flex items-center"
                            title="Validation Warnings">
                            <i class="bi bi-exclamation-triangle-fill text-sm"></i>
                            <div
                              class="absolute hidden group-hover/tooltip:block z-20 w-72 p-3 mt-2 top-full left-1/2 transform -translate-x-1/2 bg-slate-900 border border-slate-700 text-white text-xs leading-5 rounded-lg shadow-xl shadow-slate-900/50">
                              <div
                                class="max-h-[200px] overflow-y-auto whitespace-pre-line text-left font-mono font-medium tracking-tight">
                                {{ e.error }}
                              </div>
                              <div
                                class="absolute w-3 h-3 bg-slate-900 border-t border-l border-slate-700 rotate-45 -top-1.5 left-1/2 -translate-x-1/2">
                              </div>
                            </div>
                          </span>
                        </div>
                      </ng-container>

                      <!-- Success / Success with Error -->
                      <ng-container *ngIf="e.validation_status === 'Success'">
                        <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full border"
                          [ngClass]="e.error ? 'bg-orange-50 border-orange-100' : 'bg-green-50 border-green-100'">
                          <span class="text-green-600 flex items-center"
                            [title]="e.error ? 'Validated with warnings' : 'Validated Successfully'">
                            <i class="bi bi-check-circle-fill text-base"></i>
                          </span>
                          <span *ngIf="e.error"
                            class="text-red-500 cursor-help relative group/tooltip flex items-center"
                            title="Validation Warnings">
                            <i class="bi bi-exclamation-triangle-fill text-sm"></i>
                            <div
                              class="absolute hidden group-hover/tooltip:block z-20 w-72 p-3 mt-2 top-full right-0 md:left-1/2 transform md:-translate-x-1/2 bg-slate-900 border border-slate-700 text-white text-xs leading-5 rounded-lg shadow-xl shadow-slate-900/50">
                              <div
                                class="max-h-[200px] overflow-y-auto whitespace-pre-line text-left font-mono font-medium tracking-tight">
                                {{ e.error }}
                              </div>
                              <div
                                class="absolute w-3 h-3 bg-slate-900 border-t border-l border-slate-700 rotate-45 -top-1.5 right-4 md:left-1/2 md:-translate-x-1/2">
                              </div>
                            </div>
                          </span>
                        </div>
                      </ng-container>

                      <!-- Needs to be run -->
                      <ng-container *ngIf="e.validation_status === 'Needs to be run'">
                        <div
                          class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-slate-100 border border-slate-200 text-slate-500"
                          title="Needs to be run">
                          <i class="bi bi-play-circle text-base"></i>
                        </div>
                      </ng-container>

                    </ng-container>
                  </div>
                </td>

                <td class="px-6 py-4 whitespace-nowrap text-right align-middle">
                  <button (click)="pushEmail(e)" [disabled]="!e.selected || e.emailLoading"
                    class="inline-flex items-center gap-2 px-3.5 py-1.5 bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-200 disabled:text-slate-400 disabled:border-transparent text-white font-bold text-xs rounded-lg shadow-sm focus:outline-none focus:ring-4 focus:ring-emerald-500/20 transition-all cursor-pointer border border-transparent">
                    <ng-container *ngIf="!e.emailLoading; else emailLoading">
                      <i class="bi bi-envelope-paper-fill mr-1"></i> Send
                    </ng-container>
                    <ng-template #emailLoading>
                      <svg class="animate-spin h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                      </svg>
                      Sending
                    </ng-template>
                  </button>
                </td>

              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
