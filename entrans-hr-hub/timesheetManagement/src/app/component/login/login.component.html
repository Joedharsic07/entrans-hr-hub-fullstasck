<div class="min-h-screen bg-slate-50 flex flex-col font-sans antialiased text-slate-800 relative overflow-hidden">

  <!-- Decorative background elements -->
  <div
    class="absolute top-0 left-0 right-0 h-96 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none origin-top blur-3xl transform scale-150">
  </div>

  <!-- Header Logo -->
  <div class="relative z-10 pt-8 px-8 sm:px-12 flex items-center gap-3">
    <img src="/assets/svg/Rectangle 90.svg" alt="Entrans Logo" class="h-10 w-auto" />
    <div class="h-6 w-px bg-slate-300"></div>
    <span class="text-slate-600 font-semibold text-sm tracking-wide uppercase">HR Hub Elite</span>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-center p-6 relative z-10 w-full max-w-6xl mx-auto">

    <div class="w-full grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">

      <!-- Left Column: Form -->
      <div class="flex flex-col items-center lg:items-start max-w-md mx-auto lg:mx-0 lg:ml-auto w-full">

        <div class="w-full">
          <h1 class="text-[32px] sm:text-[38px] font-bold text-slate-900 tracking-tight mb-2">Welcome Back</h1>
          <p class="text-slate-500 text-base mb-8">Please enter your credentials to access your account.</p>

          <div
            class="bg-white rounded-2xl shadow-lg border border-slate-200/60 p-8 sm:p-10 w-full relative overflow-hidden">
            <!-- decorative accent line -->
            <div class="absolute top-0 left-0 right-0 h-1.5 bg-primary"></div>

            <div class="mb-6">
              <h2 class="text-xl font-bold text-slate-800">Sign In</h2>
            </div>

            <form [formGroup]="loginForm" class="space-y-5">

              <!-- Email Field -->
              <div>
                <label for="email" class="block text-sm font-semibold text-slate-600 mb-1.5">Email Address</label>
                <input type="email" id="email" formControlName="email"
                  class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2.5 px-4 text-slate-800 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none"
                  placeholder="name@company.com" />
                <div class="mt-1" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
                  <small class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-1"
                    *ngIf="loginForm.get('email')?.errors?.['required']">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    Email is required.
                  </small>
                </div>
                <div class="mt-1" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.dirty">
                  <small class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-1"
                    *ngIf="loginForm.get('email')?.errors?.['email']">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    Invalid email format.
                  </small>
                </div>
              </div>

              <!-- Password Field -->
              <div>
                <div class="flex items-center justify-between mb-1.5">
                  <label for="password" class="block text-sm font-semibold text-slate-600">Password</label>
                  <a routerLink="/password_reset"
                    class="text-xs font-bold text-primary hover:text-primary-hover hover:underline transition-all">Forgot password?</a>
                </div>
                <div class="relative">
                  <input [type]="isPasswordVisible ? 'text' : 'password'" id="password" formControlName="password"
                    class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2.5 px-4 pr-10 text-slate-800 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none"
                    placeholder="••••••••" />
                  <button type="button"
                    class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 transition-colors focus:outline-none"
                    (click)="isPasswordVisible = !isPasswordVisible">
                    <i class="bi" [ngClass]="isPasswordVisible ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
                  </button>
                </div>
                <div class="mt-1" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                  <small class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-1"
                    *ngIf="loginForm.get('password')?.errors?.['required']">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    Password is required.
                  </small>
                </div>
                <div class="mt-1" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.dirty">
                  <small class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-1"
                    *ngIf="loginForm.get('password')?.errors?.['minlength']">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    Minimum 8 characters.
                  </small>
                  <small class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-1"
                    *ngIf="loginForm.get('password')?.errors?.['maxlength']">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    Maximum 12 characters.
                  </small>
                  <small class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-1"
                    *ngIf="loginForm.get('password')?.errors?.['pattern']">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    Invalid password format.
                  </small>
                </div>
              </div>

              <!-- Submit Button -->
              <div class="pt-2">
                <button type="submit" (click)="onLogin()" [disabled]="!loginForm.valid || isLoading"
                  class="w-full bg-primary hover:bg-primary-hover disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all flex items-center justify-center gap-2 focus:outline-none focus:ring-4 focus:ring-primary/20">
                  <span *ngIf="!isLoading">Log in to HR Hub</span>
                  <span *ngIf="isLoading" class="flex items-center gap-2">
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg"
                      fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                      </path>
                    </svg>
                    Logging in...
                  </span>
                </button>
              </div>

            </form>

            <div class="mt-8 pt-6 border-t border-slate-200/60 text-center">
              <p class="text-sm text-slate-500 font-semibold">
                Don't have an account?
                <button (click)="onSignup()"
                  class="font-bold text-primary hover:text-primary-hover hover:underline focus:outline-none transition-colors">Sign up now</button>
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Illustration -->
      <div class="hidden lg:flex justify-center items-center w-full h-full pb-10">
        <div class="relative w-full max-w-lg aspect-square">
          <!-- Soft glowing backdrop for illustration -->
          <div
            class="absolute inset-0 bg-slate-200/50 rounded-full transform -rotate-12 scale-105 opacity-50">
          </div>
          <img src="/assets/loginLogo.png" alt="Login Illustration"
            class="relative z-10 w-full h-full object-contain drop-shadow-xl filter brightness-105" />
        </div>
      </div>

    </div>
  </div>
</div>
