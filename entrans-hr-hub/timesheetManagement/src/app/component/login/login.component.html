<div class="min-h-screen bg-slate-100 flex items-center justify-center font-sans antialiased text-slate-800 p-4 sm:p-8">

  <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 shadow-2xl rounded-3xl overflow-hidden">

    <!-- Left Panel: Form -->
    <div class="bg-white flex flex-col p-8 sm:p-12">

      <!-- Logo -->
      <div class="flex items-center gap-3 mb-10">
        <img src="/assets/logo.png" alt="Entrans Logo" class="h-10 w-auto" />
        <div class="h-5 w-px bg-slate-200"></div>
        <span class="text-slate-500 font-semibold text-xs tracking-widest uppercase">HR Hub Elite</span>
      </div>

      <!-- Heading -->
      <div class="mb-8">
        <h1 class="page-title mb-1">Welcome back</h1>
        <p class="text-slate-500 text-sm">Sign in to your account to continue.</p>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" class="space-y-5">

        <!-- Email -->
        <div>
          <label for="email" class="label-text">Email Address</label>
          <input type="email" id="email" formControlName="email"
            class="form-input"
            placeholder="name@company.com" />
          <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="mt-1.5 space-y-1">
            <small class="text-red-500 font-semibold text-xs flex items-center gap-1"
              *ngIf="loginForm.get('email')?.errors?.['required']">
              <i class="bi bi-exclamation-circle-fill"></i> Email is required.
            </small>
            <small class="text-red-500 font-semibold text-xs flex items-center gap-1"
              *ngIf="loginForm.get('email')?.errors?.['email']">
              <i class="bi bi-exclamation-circle-fill"></i> Invalid email format.
            </small>
          </div>
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="label-text !mb-0">Password</label>
            <a routerLink="/password_reset"
              class="text-xs font-bold text-primary hover:text-primary-hover hover:underline transition-all">Forgot password?</a>
          </div>
          <div class="relative">
            <input [type]="isPasswordVisible ? 'text' : 'password'" id="password" formControlName="password"
              class="form-input pr-11"
              placeholder="••••••••" />
            <button type="button" (click)="isPasswordVisible = !isPasswordVisible"
              class="absolute inset-y-0 right-0 flex items-center px-4 text-slate-400 hover:text-slate-600 transition-colors focus:outline-none">
              <i class="bi" [ngClass]="isPasswordVisible ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </button>
          </div>
          <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="mt-1.5 space-y-1">
            <small class="text-red-500 font-semibold text-xs flex items-center gap-1"
              *ngIf="loginForm.get('password')?.errors?.['required']">
              <i class="bi bi-exclamation-circle-fill"></i> Password is required.
            </small>
            <small class="text-red-500 font-semibold text-xs flex items-center gap-1"
              *ngIf="loginForm.get('password')?.errors?.['minlength']">
              <i class="bi bi-exclamation-circle-fill"></i> Minimum 8 characters.
            </small>
            <small class="text-red-500 font-semibold text-xs flex items-center gap-1"
              *ngIf="loginForm.get('password')?.errors?.['maxlength']">
              <i class="bi bi-exclamation-circle-fill"></i> Maximum 12 characters.
            </small>
            <small class="text-red-500 font-semibold text-xs flex items-center gap-1"
              *ngIf="loginForm.get('password')?.errors?.['pattern']">
              <i class="bi bi-exclamation-circle-fill"></i> Invalid password format.
            </small>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="pt-2">
          <button type="submit" (click)="onLogin()" [disabled]="!loginForm.valid || isLoading"
            class="btn btn-primary btn-lg w-full">
            <span *ngIf="!isLoading">Log in to HR Hub</span>
            <span *ngIf="isLoading" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
              </svg>
              Logging in...
            </span>
          </button>
        </div>

      </form>

      <div class="mt-8 pt-6 border-t border-slate-100 text-center">
        <p class="text-sm text-slate-500">
          Don't have an account?
          <button (click)="onSignup()"
            class="font-bold text-primary hover:text-primary-hover hover:underline focus:outline-none transition-colors">Sign
            up now</button>
        </p>
      </div>

    </div>

    <!-- Right Panel: Image — same height as form card -->
    <div class="hidden lg:block relative overflow-hidden">
      <img src="/assets/loginLogo.png" alt="Login Illustration"
        class="absolute inset-0 w-full h-full object-cover" />
    </div>

  </div>

</div>
