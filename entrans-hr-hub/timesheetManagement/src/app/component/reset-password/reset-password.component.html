<div class="min-h-screen bg-slate-100 flex items-center justify-center font-sans antialiased text-slate-800 p-4 sm:p-8">

  <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 shadow-2xl rounded-3xl overflow-hidden">

    <!-- Left Panel: Form -->
    <div class="bg-white flex flex-col p-8 sm:p-12">

      <!-- Logo -->
      <div class="flex items-center gap-3 mb-10">
        <img src="/assets/logo.png" alt="Entrans Logo" class="h-10 w-auto" />
        <div class="h-5 w-px bg-slate-200"></div>
        <span class="text-slate-500 font-semibold text-xs tracking-widest uppercase">HR Hub Elite</span>
      </div>

      <!-- Heading -->
      <div class="mb-8">
        <h1 class="page-title mb-1">Reset Password</h1>
        <p class="text-slate-500 text-sm">Enter your email address to receive a secure reset link.</p>
      </div>

      <div *ngIf="message"
        class="bg-green-50 text-green-700 border border-green-200 rounded-xl p-3 mb-5 text-sm font-semibold flex items-center gap-2">
        <i class="bi bi-check-circle-fill"></i> {{ message }}
      </div>
      <div *ngIf="error"
        class="bg-red-50 text-red-700 border border-red-200 rounded-xl p-3 mb-5 text-sm font-semibold flex items-center gap-2">
        <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
      </div>

      <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Email Field -->
        <div>
          <label for="email" class="label-text">Email Address</label>
          <input type="email" id="email" formControlName="email"
            class="form-input"
            placeholder="name@company.com" />
          <div class="mt-1.5 space-y-1" *ngIf="submitted && forgotPasswordForm.get('email')?.invalid">
            <small class="text-red-500 font-semibold text-xs flex items-center gap-1" *ngIf="forgotPasswordForm.get('email')?.errors?.['required']"><i class="bi bi-exclamation-circle-fill"></i> Email is required.</small>
            <small class="text-red-500 font-semibold text-xs flex items-center gap-1" *ngIf="forgotPasswordForm.get('email')?.errors?.['email']"><i class="bi bi-exclamation-circle-fill"></i> Invalid email format.</small>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="pt-2">
          <button type="submit" [disabled]="loading"
            class="btn btn-primary btn-lg w-full">
            <span *ngIf="!loading">Send Reset Link</span>
            <span *ngIf="loading" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Sending...
            </span>
          </button>
        </div>

      </form>

      <div class="mt-8 pt-6 border-t border-slate-100 text-center">
        <a routerLink="/login"
          class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-primary transition-colors focus:outline-none">
          <i class="bi bi-arrow-left"></i> Back to Login
        </a>
      </div>

    </div>

    <!-- Right Panel: Image — same height as form card -->
    <div class="hidden lg:block relative overflow-hidden">
      <img src="/assets/loginLogo.png" alt="Reset Password Illustration"
        class="absolute inset-0 w-full h-full object-cover" />
    </div>

  </div>

</div>
